apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-router-netpol
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-router-netpol
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  - nodes
  - pods
  - services
  - endpoints
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-router-netpol
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-router-netpol
subjects:
- kind: ServiceAccount
  name: kube-router-netpol
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-router-netpol
  namespace: kube-system
  labels:
    app: kube-router-netpol
spec:
  selector:
    matchLabels:
      app: kube-router-netpol
  template:
    metadata:
      labels:
        app: kube-router-netpol
    spec:
      serviceAccountName: kube-router-netpol
      hostNetwork: true
      tolerations:
      - operator: Exists
      containers:
      - name: kube-router
        image: cloudnativelabs/kube-router:v2.10.0
        imagePullPolicy: IfNotPresent
        args:
        - --run-router=false
        - --run-firewall=true
        - --run-service-proxy=false
        - --run-loadbalancer=false
        - --metrics-path=/metrics
        - --metrics-port=20246
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
