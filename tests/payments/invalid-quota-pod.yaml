apiVersion: v1
kind: Pod
metadata:
  name: payments-invalid-quota
  namespace: payments
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
  containers:
  - name: api
    image: ghcr.io/nguyenthanhdat2707/w10-api:0.0.2
    command: ["sh", "-c", "sleep 3600"]
    resources:
      requests:
        cpu: "2"
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 2Gi
