apiVersion: apps/v1
kind: Deployment
metadata:
  name: invalid-replicas
  namespace: demo
spec:
  replicas: 6
  selector:
    matchLabels:
      app: invalid-replicas
  template:
    metadata:
      labels:
        app: invalid-replicas
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
      - name: busybox
        image: busybox:1.36.1
        command: ["sh", "-c", "sleep 3600"]
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
