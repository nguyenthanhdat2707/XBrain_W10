apiVersion: v1
kind: Pod
metadata:
  name: valid-pod
  namespace: demo
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
  containers:
  - name: busybox
    image: busybox:1.36.1
    command: ["sh", "-c", "sleep 3600"]
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
