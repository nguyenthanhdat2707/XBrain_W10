apiVersion: apps/v1
kind: Deployment
metadata:
  name: eso-secret-reader
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: eso-secret-reader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eso-secret-reader
  template:
    metadata:
      labels:
        app: eso-secret-reader
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
      - name: reader
        image: busybox:1.36.1
        command: ["sh", "-c", "while true; do sleep 3600; done"]
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - name: db-secret
          mountPath: /etc/secrets
          readOnly: true
      volumes:
      - name: db-secret
        secret:
          secretName: demo-db-secret
          items:
          - key: password
            path: password
