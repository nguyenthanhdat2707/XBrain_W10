# Build and push Docker image to GitHub Container Registry
name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nguyenthanhdat2707/w10-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.semver.outputs.version }}
            type=sha,prefix=v${{ steps.semver.outputs.version }}-,format=short

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy scan Docker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          format: table
          exit-code: '1'

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push scanned Docker image
        id: push
        env:
          IMAGE_VERSION: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail

          push_output="$(docker push "$IMAGE_VERSION")"
          printf '%s\n' "$push_output"

          digest="$(printf '%s\n' "$push_output" | awk '/digest: sha256:/ {print $3; exit}')"
          if [ -z "$digest" ]; then
            digest="$(docker buildx imagetools inspect "$IMAGE_VERSION" --format '{{.Manifest.Digest}}')"
          fi

          printf '%s\n' "$IMAGE_TAGS" | while IFS= read -r image; do
            if [ -n "$image" ] && [ "$image" != "$IMAGE_VERSION" ]; then
              docker push "$image"
            fi
          done

          echo "image-ref=$IMAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "image-digest=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$digest" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.9.1
        with:
          cosign-release: v2.5.2

      - name: Sign image digest with Cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          IMAGE_DIGEST: ${{ steps.push.outputs.image-digest }}
        run: |
          set -euo pipefail

          key_file="$RUNNER_TEMP/cosign.key"
          generated_pub="$RUNNER_TEMP/cosign.pub.generated"
          expected_pub="$RUNNER_TEMP/cosign.pub.expected"
          trap 'rm -f "$key_file" "$generated_pub" "$expected_pub"' EXIT

          if [ -z "${COSIGN_PRIVATE_KEY:-}" ]; then
            echo "::error::COSIGN_PRIVATE_KEY is empty"
            exit 1
          fi

          if [ -z "${COSIGN_PASSWORD:-}" ]; then
            echo "::error::COSIGN_PASSWORD is empty"
            exit 1
          fi

          if printf '%s' "$COSIGN_PRIVATE_KEY" | grep -q 'BEGIN .*PRIVATE KEY'; then
            printf '%s' "$COSIGN_PRIVATE_KEY" > "$key_file"
          elif printf '%b' "$COSIGN_PRIVATE_KEY" | grep -q 'BEGIN .*PRIVATE KEY'; then
            printf '%b' "$COSIGN_PRIVATE_KEY" > "$key_file"
          else
            if ! printf '%s' "$COSIGN_PRIVATE_KEY" | base64 -d > "$key_file"; then
              echo "::error::COSIGN_PRIVATE_KEY must be a PEM, escaped PEM, or base64-encoded PEM"
              exit 1
            fi
          fi

          chmod 600 "$key_file"
          cosign public-key --key "$key_file" > "$generated_pub"
          tr -d '\r' < signing/cosign.pub > "$expected_pub"

          if ! cmp -s "$expected_pub" "$generated_pub"; then
            echo "::error::COSIGN_PRIVATE_KEY does not match signing/cosign.pub"
            exit 1
          fi

          cosign sign --yes --key "$key_file" "$IMAGE_DIGEST"

      - name: Verify image signature
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.image-digest }}
        run: cosign verify --key signing/cosign.pub "$IMAGE_DIGEST"

      - name: Update rollout.yaml with new version
        run: |
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}|g" app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" app-api/rollout.yaml

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to v${{ steps.semver.outputs.version }}"
            git push
          fi

      - name: Create git tag
        run: |
          if git rev-parse "v${{ steps.semver.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.semver.outputs.version }} already exists"
          else
            git tag v${{ steps.semver.outputs.version }}
            git push origin v${{ steps.semver.outputs.version }}
          fi
