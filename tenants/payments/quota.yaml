apiVersion: v1
kind: ResourceQuota
metadata:
  name: payments-quota
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  hard:
    pods: "10"
    services: "5"
    configmaps: "10"
    persistentvolumeclaims: "0"
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
